apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-first-app
  namespace: my-first-app
  labels:
    app: my-first-app
    backstage.io/kubernetes-id: my-first-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-first-app
  template:
    metadata:
      labels:
        app: my-first-app
        backstage.io/kubernetes-id: my-first-app
    spec:
      containers:
      - name: nginx
        image: public.ecr.aws/nginx/nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
          readOnly: true
      volumes:
      - name: html
        configMap:
          name: my-first-app-html
