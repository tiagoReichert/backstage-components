apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: my-first-app-hpa
  namespace: my-first-app
  labels:
    app: my-first-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: my-first-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
